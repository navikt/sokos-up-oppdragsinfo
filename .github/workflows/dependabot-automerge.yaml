name: Dependabot Auto-merge

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * MON-FRI"

env:
  TZ: Europe/Oslo

jobs:
  dependabot-automerge:
    permissions:
      contents: read
      pull-requests: write
    name: Dependabot Auto-merge
    uses: navikt/mob-gha-workflows/.github/workflows/dependabot-automerge.yaml@dac7a1ac47e76110d90af301b2152057c215c867 # ratchet:navikt/mob-gha-workflows/.github/workflows/dependabot-automerge.yaml@v1.0.0
    secrets:
      APP_ID: ${{ vars.APP_ID }}
      PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}